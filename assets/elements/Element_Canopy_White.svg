    M64 12 L110 30 V62 C110 96 90 112 64 120 C38 112 18 96 18 62 V30 Z
    M64 28 L81 45 L64 62 L47 45 Z
    M45 49 L62 66 L45 83 L28 66 Z
    M83 49 L100 66 L83 83 L66 66 Z
    M64 70 L81 87 L64 104 L47 87 Z
  "/>
</svg>
